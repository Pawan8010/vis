<!DOCTYPE html>
<html>
<head>
    <title>Bachat Gat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            font-family: 'Segoe UI';
        }

        .container-box {
            margin: 50px auto;
            max-width: 900px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .btn-custom {
            border-radius: 20px;
            margin: 10px;
            padding: 10px 20px;
        }
    </style>
</head>

<body>

<div class="container-box text-center">

    <h2 class="mb-4 text-primary">💰 Bachat Gat Management</h2>

    <a href="{% url 'AddMember' %}" class="btn btn-primary btn-custom">Add Member</a>
    <a href="{% url 'ViewMembers' %}" class="btn btn-success btn-custom">View Members</a>
    <a href="{% url 'loanmanagement' %}" class="btn btn-info btn-custom">Loan Management</a>
    <a href="{% url 'reports' %}" class="btn btn-danger btn-custom">Reports</a>

    <hr>

    <!-- ✅ FIX: Withdraw must get member.id -->
    <h4 class="mt-4">Members List</h4>

    {% for member in members %}
        <div class="border p-2 m-2 rounded">
            <strong>{{ member.name }}</strong>

            <a href="{% url 'pigmi_withdraw' member.id %}"
               class="btn btn-danger btn-sm float-end">
                💸 Withdraw
            </a>
        </div>
    {% endfor %}

</div>

</body>
</html>
