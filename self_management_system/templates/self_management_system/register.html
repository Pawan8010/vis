<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Group Registration</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #90caf9);
        }

        .container-box {
            max-width: 900px;
            margin: 40px auto;
            background: #ffffff;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .title {
            text-align: center;
            font-weight: bold;
            color: #0d6efd;
            margin-bottom: 25px;
        }

        .section-title {
            margin-top: 25px;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
        }

        .form-control, .form-select {
            border-radius: 10px;
        }

        .btn-custom {
            border-radius: 30px;
            padding: 10px 30px;
            font-size: 16px;
        }

        .info-text {
            font-size: 13px;
            color: #6c757d;
        }

        .error {
            color: red;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container-box">

    <h2 class="title">🏦 New Group Registration</h2>

    <!-- Error Message -->
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <!-- 👤 Admin Details -->
        <h5 class="section-title">👤 Group Admin Details</h5>

        <div class="row">
            <div class="col-md-6 mb-3">
                <input type="text" name="name" class="form-control"
                       placeholder="Full Name" required minlength="3">
            </div>

            <div class="col-md-6 mb-3">
                <input type="text" name="username" class="form-control"
                       placeholder="Username" required minlength="4">
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <input type="email" name="email" class="form-control"
                       placeholder="Email Address" required>
            </div>

            <div class="col-md-6 mb-3">
                <input type="password" name="password" class="form-control"
                       placeholder="Password (min 6 chars)" required minlength="6">
            </div>
        </div>

        <!-- 🏦 Scheme -->
        <h5 class="section-title">🏦 Scheme Details</h5>

        <div class="row">
            <div class="col-md-6 mb-3">
                <select name="scheme_type" class="form-select" required>
                    <option value="">-- Select Scheme Type --</option>
                    <option value="pigmi">Pigmi</option>
                    <option value="bachat_gat">Bachat Gat</option>
                    <option value="both">Both (Pigmi + Bachat Gat)</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <input type="text" class="form-control" 
                       value="Registration Number will be auto-generated"
                       disabled>
            </div>
        </div>

        <p class="info-text">* Registration Number will be generated automatically after submission.</p>

        <!-- 👥 Group Info -->
        <h5 class="section-title">👥 Group Information</h5>

        <div class="row">
            <div class="col-md-12 mb-3">
                <input type="text" name="group_name" class="form-control"
                       placeholder="Group Name" required minlength="3">
            </div>
        </div>

        <!-- 📞 Contact -->
        <h5 class="section-title">📞 Contact Information</h5>

        <div class="row">
            <div class="col-md-6 mb-3">
                <input type="tel" name="phone" class="form-control"
                       placeholder="Phone Number" required pattern="[0-9]{10}">
            </div>

            <div class="col-md-6 mb-3">
                <input type="text" name="city" class="form-control"
                       placeholder="City" required>
            </div>
        </div>

        <!-- Submit -->
        <div class="text-center mt-4">
            <button type="submit" class="btn btn-primary btn-custom">
                Register Group
            </button>
        </div>

    </form>

</div>

</body>
</html>
