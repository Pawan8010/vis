<!DOCTYPE html>
<html>
<head>
    <title>Add Pigmi Member</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            font-family: 'Segoe UI';
        }

        .form-box {
            max-width: 500px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .btn-custom {
            border-radius: 25px;
        }
    </style>
</head>

<body>

<div class="form-box">

    <h3 class="text-center text-success mb-3">➕ Add Member</h3>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="name" class="form-control mb-2" placeholder="Name" required>

        <input type="text" name="phone" class="form-control mb-2" placeholder="Phone" required>

        <input type="email" name="email" class="form-control mb-2" placeholder="Email" required>

        <textarea name="address" class="form-control mb-2" placeholder="Address" required></textarea>

        <label>Start Date</label>
        <input type="date" name="start_date" class="form-control mb-2" required>

        <input type="number" name="daily_amount" class="form-control mb-2" placeholder="Daily Amount" required>

        <input type="number" name="monthly_target" class="form-control mb-2" placeholder="Monthly Target">

        <input type="text" name="aadhar" class="form-control mb-3" placeholder="Aadhar Number">

        <button class="btn btn-success w-100 btn-custom">Save Member</button>
    </form>

</div>

</body>
</html>
