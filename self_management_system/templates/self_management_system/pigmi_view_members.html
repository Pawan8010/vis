<!DOCTYPE html>
<html>
<head>
    <title>All Pigmi Members</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .container-box {
            max-width: 1100px;
            margin: 40px auto;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0,0,0,0.08);
        }

        .table thead {
            background: #0d6efd;
            color: white;
        }

        .badge-phone {
            background: #e9ecef;
            color: #333;
            padding: 5px 10px;
            border-radius: 6px;
        }

        .action-btns a {
            margin-right: 6px;
        }
    </style>
</head>

<body>

<div class="container container-box">

    <div class="card p-4">

        <h3 class="text-primary mb-3">👥 All Pigmi Members</h3>

        <table class="table table-hover align-middle">

            <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>

                {% for m in members %}
                <tr>
                    <td>{{ forloop.counter }}</td>

                    <td>
                        <b>{{ m.name }}</b>
                    </td>

                    <td>
                        <span class="badge-phone">{{ m.phone }}</span>
                    </td>

                    <td class="action-btns">

                        <!-- VIEW DETAILS -->
                        <a href="{% url 'pigmi_member_detail' m.id %}" 
                           class="btn btn-sm btn-primary">
                           👁 View
                        </a>

                        <!-- DEPOSIT -->
                        <a href="{% url 'pigmi_deposit' %}?member_id={{ m.id }}" 
                           class="btn btn-sm btn-success">
                           💰 Deposit
                        </a>

                        <!-- WITHDRAW -->
                        <a href="{% url 'pigmi_withdraw' m.id %}" 
                           class="btn btn-sm btn-danger">
                           💸 Withdraw
                        </a>

                    </td>
                </tr>
                {% empty %}

                <tr>
                    <td colspan="4" class="text-center text-muted">
                        No members found ❌
                    </td>
                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
