<!DOCTYPE html>
<html>
<head>
    <title>Pigmi Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h3 class="text-primary mb-4">📊 Pigmi Dashboard</h3>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Member</th>
                <th>Deposit 💰</th>
                <th>Withdraw 💸</th>
                <th>Balance 🏦</th>
            </tr>
        </thead>

        <tbody>
            {% for d in data %}
            <tr>
                <td>{{ d.member.id }}</td>   <!-- ✅ Added Member ID -->

                <td>{{ d.member.name }}</td>

                <td class="text-success">{{ d.deposit }}</td>

                <td class="text-danger">{{ d.withdraw }}</td>

                <td class="text-primary">{{ d.balance }}</td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

</div>

</body>
</html>
